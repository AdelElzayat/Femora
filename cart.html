<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Femora - Cart</title>
    <link
      rel="icon"
      type="image/png"
      sizes="64x64"
      href="img/Feminine elegance with a pink rose.png"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="shortcut icon" href="img/Logo.png" type="image/x-icon" />
  </head>

  <body>
    <div class="navbar">
      <div class="navdiv">
        <div class="logo">
          <a href="/index.html"
            ><img
              src="img/Femora_logo_with_pink_rose-removebg-preview.png"
              alt="logo"
          /></a>
        </div>
        <ul>
          <button class="login"><a href="login-form.html">Login</a></button>
          <button class="register">
            <a href="login-form.html?mode=register">Register</a>
          </button>
        </ul>
      </div>
    </div>

    <section>
      <div class="search-container"></div>

      <div class="cards" id="cart-cards"></div>

      <div
        id="cart-total"
        style="text-align: center; margin: 18px 0; font-weight: bold"
      ></div>
    </section>

    <script src="script.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const container = document.getElementById("cart-cards");
        container.innerHTML = "";
        let cart = [];
        try {
          cart = JSON.parse(localStorage.getItem("cart")) || [];
        } catch (e) {
          cart = [];
        }
        if (!cart || cart.length === 0) {
          const msg = document.createElement("div");
          msg.textContent = "No items in cart.";
          msg.style.padding = "12px";
          msg.style.textAlign = "center";
          msg.style.position = "relative";
          msg.style.left = "167px";
          msg.style.bottom = "80px";
          container.appendChild(msg);
        }
        let total = 0;

        let grid = document.querySelector(".cart-grid");
        if (!grid) {
          grid = document.createElement("div");
          grid.className = "cart-grid";
          container.appendChild(grid);
        }
        cart.forEach((item) => {
          const card = document.createElement("div");
          card.className = "cart-card";
          card.style.display = "flex";
          card.style.alignItems = "center";
          card.style.border = "1px solid #ccc";
          card.style.padding = "8px";
          card.style.margin = "4px";

          let imgEl = document.createElement("img");
          imgEl.className = "item-img";
          imgEl.style.minWidth = "80px";
          imgEl.style.minHeight = "80px";
          imgEl.style.background = "#f5f5f5";
          imgEl.style.borderRadius = "8px";
          imgEl.style.marginRight = "12px";
          if (item.img) {
            imgEl.src = item.img;
          } else imgEl.src = "";
          card.appendChild(imgEl);

          const info = document.createElement("div");
          info.style.flex = "1";
          const nameEl = document.createElement("h3");
          nameEl.className = "item-name";
          nameEl.textContent = item.name;
          info.appendChild(nameEl);
          const priceEl = document.createElement("p");
          priceEl.className = "item-price";
          priceEl.textContent = "$" + item.price;
          info.appendChild(priceEl);
          card.appendChild(info);

          const qtyCtr = document.createElement("div");
          qtyCtr.style.display = "flex";
          qtyCtr.style.alignItems = "center";
          qtyCtr.style.margin = "0 12px";
          const dec = document.createElement("button");
          dec.textContent = "-";
          dec.type = "button";
          dec.className = "qty-btn";
          const qtySpan = document.createElement("span");
          qtySpan.textContent = item.qty || 1;
          qtySpan.style.margin = "0 6px";
          const inc = document.createElement("button");
          inc.textContent = "+";
          inc.type = "button";
          inc.className = "qty-btn";

          function refreshTotals() {
            priceEl.textContent = "$" + (item.price * item.qty).toFixed(2);

            let t = 0;
            cart.forEach((i) => {
              t += i.price * (i.qty || 1);
            });
            document.getElementById("cart-total").textContent =
              "Total price: $" + t.toFixed(2);
          }
          dec.addEventListener("click", () => {
            const newQty = (item.qty || 1) - 1;
            if (newQty > 0) {
              item.qty = newQty;
              localStorage.setItem("cart", JSON.stringify(cart));
              qtySpan.textContent = item.qty;
              refreshTotals();
            }
          });
          inc.addEventListener("click", () => {
            item.qty = (item.qty || 1) + 1;
            localStorage.setItem("cart", JSON.stringify(cart));
            qtySpan.textContent = item.qty;
            refreshTotals();
          });
          qtyCtr.appendChild(dec);
          qtyCtr.appendChild(qtySpan);
          qtyCtr.appendChild(inc);
          card.appendChild(qtyCtr);
          const rem = document.createElement("button");
          rem.className = "remove-btn";
          rem.textContent = "Remove";
          rem.style.color = "red";
          rem.style.background = "none";
          rem.style.border = "none";
          rem.addEventListener("click", function () {
            cart = cart.filter((c) => c.id !== item.id);
            localStorage.setItem("cart", JSON.stringify(cart));
            location.reload();
          });
          card.appendChild(rem);
          grid.appendChild(card);
          total += item.price * (item.qty || 1);
        });
        const totalDiv = document.getElementById("cart-total");

        let totSection = document.querySelector(".total-section");
        if (!totSection) {
          totSection = document.createElement("div");
          totSection.className = "total-section";
          container.appendChild(totSection);
          totSection.appendChild(totalDiv);
        }
        totalDiv.textContent = "Total price: $" + total.toFixed(2);

        const favs = (function () {
          try {
            return JSON.parse(localStorage.getItem("favorites")) || [];
          } catch (e) {
            return [];
          }
        })();

        const favsWrapper = document.createElement("div");
        favsWrapper.id = "favs-wrapper";
        const header = document.createElement("h2");
        header.textContent = "Favorites";
        header.style.textAlign = "center";
        header.style.margin = "24px 0 12px";
        header.id = "favs-header";
        const favContainer = document.createElement("div");
        favContainer.className = "fav-container";
        favContainer.id = "favs-container";

        if (favs && favs.length) {
          favsWrapper.appendChild(header);
          favs.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "item";
            card.style.position = "relative";
            card.style.margin = "12px";
            card.style.minWidth = "200px";
            card.setAttribute("data-fav-id", item.id);

            const imgEl = document.createElement("img");
            imgEl.className = "item-img";
            imgEl.style.background = "#f5f5f5";
            imgEl.style.height = "140px";
            imgEl.style.borderRadius = "30px 30px 0 0";
            if (item.img) imgEl.src = item.img;
            card.appendChild(imgEl);
            const name = document.createElement("h3");
            name.className = "item-name";
            name.textContent = item.name;
            card.appendChild(name);
            const price = document.createElement("p");
            price.className = "item-price";
            price.textContent = "Price: $" + item.price;
            card.appendChild(price);
            const cat = document.createElement("p");
            cat.className = "item-category";
            cat.textContent = "Category: " + (item.category || "-");
            card.appendChild(cat);

            const heartContainer = document.createElement("div");
            heartContainer.className = "heart-container";
            heartContainer.title = "Like";
            heartContainer.style.position = "absolute";
            heartContainer.style.top = "8px";
            heartContainer.style.right = "8px";
            const checkbox = document.createElement("input");
            checkbox.type = "checkbox";
            checkbox.className = "checkbox";
            checkbox.checked = true;
            checkbox.id = "fav-" + item.id;
            const svgContainer = document.createElement("div");
            svgContainer.className = "svg-container";

            const outlineSvg = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "svg",
            );
            outlineSvg.setAttribute("viewBox", "0 0 24 24");
            outlineSvg.setAttribute("class", "svg-outline");
            outlineSvg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
            const outlinePath = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "path",
            );
            outlinePath.setAttribute(
              "d",
              "M17.5,1.917a6.4,6.4,0,0,0-5.5,3.3,6.4,6.4,0,0,0-5.5-3.3A6.8,6.8,0,0,0,0,8.967c0,4.547,4.786,9.513,8.8,12.88a4.974,4.974,0,0,0,6.4,0C19.214,18.48,24,13.514,24,8.967A6.8,6.8,0,0,0,17.5,1.917Zm-3.585,18.4a2.973,2.973,0,0,1-3.83,0C4.947,16.006,2,11.87,2,8.967a4.8,4.8,0,0,1,4.5-5.05A4.8,4.8,0,0,1,11,8.967a1,1,0,0,0,2,0,4.8,4.8,0,0,1,4.5-5.05A4.8,4.8,0,0,1,22,8.967C22,11.87,19.053,16.006,13.915,20.313Z",
            );
            outlineSvg.appendChild(outlinePath);

            const filledSvg = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "svg",
            );
            filledSvg.setAttribute("viewBox", "0 0 24 24");
            filledSvg.setAttribute("class", "svg-filled");
            filledSvg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
            const filledPath = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "path",
            );
            filledPath.setAttribute(
              "d",
              "M17.5,1.917a6.4,6.4,0,0,0-5.5,3.3,6.4,6.4,0,0,0-5.5-3.3A6.8,6.8,0,0,0,0,8.967c0,4.547,4.786,9.513,8.8,12.88a4.974,4.974,0,0,0,6.4,0C19.214,18.48,24,13.514,24,8.967A6.8,6.8,0,0,0,17.5,1.917Z",
            );
            filledSvg.appendChild(filledPath);

            const celebrateSvg = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "svg",
            );
            celebrateSvg.setAttribute("class", "svg-celebrate");
            celebrateSvg.setAttribute("width", "100");
            celebrateSvg.setAttribute("height", "100");
            celebrateSvg.setAttribute("xmlns", "http://www.w3.org/2000/svg");
            const celebrateCircle = document.createElementNS(
              "http://www.w3.org/2000/svg",
              "circle",
            );
            celebrateCircle.setAttribute("cx", "50");
            celebrateCircle.setAttribute("cy", "50");
            celebrateCircle.setAttribute("r", "45");
            celebrateCircle.setAttribute("fill", "none");
            celebrateCircle.setAttribute("stroke", "#ff006e");
            celebrateCircle.setAttribute("stroke-width", "2");
            celebrateSvg.appendChild(celebrateCircle);

            svgContainer.appendChild(outlineSvg);
            svgContainer.appendChild(filledSvg);
            svgContainer.appendChild(celebrateSvg);
            heartContainer.appendChild(checkbox);
            heartContainer.appendChild(svgContainer);
            card.appendChild(heartContainer);

            checkbox.addEventListener("click", function () {
              if (checkbox.checked === false) {
                const currentFavs = (function () {
                  try {
                    return JSON.parse(localStorage.getItem("favorites")) || [];
                  } catch (e) {
                    return [];
                  }
                })();
                const updatedFavs = currentFavs.filter((f) => f.id !== item.id);
                localStorage.setItem("favorites", JSON.stringify(updatedFavs));

                card.remove();

                if (updatedFavs.length === 0) {
                  favsWrapper.remove();
                }
              }
            });

            favContainer.appendChild(card);
          });
          favsWrapper.appendChild(favContainer);
          container.appendChild(favsWrapper);
        }
      });
    </script>

    <footer class="footer">
      <div class="footer-container">
        <div class="footer-brand">
          <h4>Femora</h4>
          <p class="tagline">Elegant. Feminine. Modern Luxury.</p>
        </div>
        <div class="footer-links">
          <a href="#">Privacy Policy</a>
          <span class="divider">•</span>
          <a href="#">Terms & Conditions</a>
          <span class="divider">•</span>
          <a href="#">Contact</a>
        </div>
        <div class="footer-socials">
          <a href="#" aria-label="Instagram"
            ><i class="fa-brands fa-instagram"></i
          ></a>
          <a href="#" aria-label="Pinterest"
            ><i class="fa-brands fa-pinterest"></i
          ></a>
          <a href="#" aria-label="Facebook"
            ><i class="fa-brands fa-facebook-f"></i
          ></a>
        </div>
        <div class="footer-copyright">
          <p>&copy; Femora. All rights reserved.</p>
        </div>
      </div>
    </footer>
  </body>
</html>
